<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assinar — Vendix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --dark: #1a1a2e; --gold: #c9a84c; --gold2: #b8943d; }
    body { background: var(--dark); color: #f0f0f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh;
           display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .brand { font-size: 1.6rem; font-weight: 800; color: #fff; letter-spacing: 1px; margin-bottom: 8px; }
    .brand span { color: var(--gold); }
    .card-form { background: rgba(255,255,255,.05); border: 1px solid rgba(201,168,76,.2);
                 border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 480px; }
    .card-form h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
    .card-form p.sub { color: #888; font-size: .9rem; margin-bottom: 28px; }
    .plan-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .plan-opt { border: 2px solid #333; border-radius: 12px; padding: 14px 12px;
                cursor: pointer; transition: all .2s; text-align: center; }
    .plan-opt:hover { border-color: #555; }
    .plan-opt.active { border-color: var(--gold); background: rgba(201,168,76,.08); }
    .plan-opt .plan-label { font-size: .7rem; font-weight: 700; color: #888; text-transform: uppercase;
                             letter-spacing: .08em; margin-bottom: 8px; }
    .plan-opt .plan-price-wrap { display: flex; align-items: flex-end; justify-content: center;
                                  gap: 2px; line-height: 1; margin-bottom: 4px; }
    .plan-opt .plan-currency { font-size: .85rem; font-weight: 800; color: var(--gold); margin-bottom: 4px; }
    .plan-opt .plan-amount  { font-size: 1.9rem; font-weight: 900; color: var(--gold); line-height: 1; }
    .plan-opt .plan-cents   { font-size: .95rem; font-weight: 700; color: var(--gold); margin-bottom: 3px; }
    .plan-opt .plan-price-sub { font-size: .72rem; color: #999; margin-top: 4px; }
    .plan-opt .badge-best { display: inline-block; background: var(--gold); color: #1a1a2e;
                             font-size: .65rem; font-weight: 800; padding: 2px 8px; border-radius: 10px;
                             margin-bottom: 6px; }
    .form-label { font-size: .85rem; font-weight: 600; color: #ccc; margin-bottom: 4px; }
    .form-control { background: rgba(255,255,255,.06); border: 1px solid #333; color: #f0f0f0;
                    border-radius: 10px; padding: 10px 14px; }
    .form-control:focus { background: rgba(255,255,255,.08); border-color: var(--gold);
                          color: #fff; box-shadow: 0 0 0 2px rgba(201,168,76,.2); }
    .form-control::placeholder { color: #555; }
    .btn-pagar { background: var(--gold); color: #1a1a2e; width: 100%; padding: 14px;
                 border: none; border-radius: 12px; font-weight: 800; font-size: 1rem;
                 cursor: pointer; transition: all .2s; margin-top: 8px; }
    .btn-pagar:hover { background: var(--gold2); transform: translateY(-1px); }
    .btn-pagar:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .msg-error { background: rgba(220,53,69,.15); border: 1px solid rgba(220,53,69,.3);
                 color: #ff6b6b; border-radius: 10px; padding: 10px 14px; font-size: .85rem;
                 margin-top: 12px; display: none; }
    .secure-note { text-align: center; color: #555; font-size: .78rem; margin-top: 16px; }
    .secure-note i { color: var(--gold); }
    .back-link { color: #888; font-size: .82rem; text-align: center; margin-top: 20px; }
    .back-link a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>

<div style="text-align:center;margin-bottom:28px;">
  <a href="/" style="text-decoration:none;">
    <div class="brand">Ven<span>dix</span></div>
  </a>
  <div style="color:#888;font-size:.85rem;">Sistema para depósitos, bares e lounges</div>
</div>

<div class="card-form">
  <h2>Criar sua conta</h2>
  <p class="sub">Escolha o plano e preencha os dados para começar.</p>

  <!-- PLANOS -->
  <div class="plan-toggle">
    <div class="plan-opt {% if plano == 'mensal' %}active{% endif %}" onclick="selectPlan('mensal', this)">
      <div class="badge-best" style="visibility:hidden;">-</div>
      <div class="plan-label">Mensal</div>
      <div class="plan-price-wrap">
        <span class="plan-currency">R$</span>
        <span class="plan-amount">129</span>
        <span class="plan-cents">,90</span>
      </div>
      <div class="plan-price-sub">por mês</div>
    </div>
    <div class="plan-opt {% if plano == 'anual' %}active{% endif %}" onclick="selectPlan('anual', this)">
      <div class="badge-best">🏆 MELHOR VALOR</div>
      <div class="plan-label">Anual</div>
      <div class="plan-price-wrap">
        <span class="plan-currency">R$</span>
        <span class="plan-amount">99</span>
        <span class="plan-cents">,90</span>
      </div>
      <div class="plan-price-sub">12x · R$ 1.198,80/ano</div>
    </div>
  </div>

  <input type="hidden" id="planoInput" value="{{ plano }}">

  <div class="mb-3">
    <label class="form-label">Nome da sua loja / depósito</label>
    <input type="text" id="storeName" class="form-control" placeholder="Ex: Depósito do João" autocomplete="organization">
  </div>
  <div class="mb-3">
    <label class="form-label">E-mail</label>
    <input type="email" id="email" class="form-control" placeholder="seu@email.com" autocomplete="email">
  </div>
  <div class="mb-3">
    <label class="form-label">Senha <span style="color:#666;font-weight:400;">(mín. 6 caracteres)</span></label>
    <input type="password" id="senha" class="form-control" placeholder="••••••••" autocomplete="new-password">
  </div>
  <div class="mb-3">
    <label class="form-label">Confirmar senha</label>
    <input type="password" id="senhaConfirm" class="form-control" placeholder="••••••••" autocomplete="new-password">
  </div>

  <div class="msg-error" id="msgError"></div>

  <button class="btn-pagar" id="btnPagar" onclick="irParaPagamento()">
    <i class="bi bi-lock-fill me-2"></i>Ir para o pagamento →
  </button>

  <div class="secure-note">
    <i class="bi bi-shield-check"></i> Pagamento 100% seguro via Mercado Pago
  </div>
  <div class="back-link">
    Já tem conta? <a href="/login">Entrar no sistema</a>
    &nbsp;·&nbsp; <a href="/">Voltar ao site</a>
  </div>
</div>

<script>
function selectPlan(plano, el) {
  document.querySelectorAll('.plan-opt').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('planoInput').value = plano;
}

async function irParaPagamento() {
  const btn = document.getElementById('btnPagar');
  const err = document.getElementById('msgError');
  err.style.display = 'none';

  const store_name    = document.getElementById('storeName').value.trim();
  const email         = document.getElementById('email').value.trim();
  const senha         = document.getElementById('senha').value;
  const senhaConfirm  = document.getElementById('senhaConfirm').value;
  const plano         = document.getElementById('planoInput').value;

  if (!store_name || !email || !senha || !senhaConfirm) {
    err.textContent = 'Preencha todos os campos.';
    err.style.display = 'block';
    return;
  }
  if (senha !== senhaConfirm) {
    err.textContent = 'As senhas não coincidem.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Aguarde...';

  const form = new FormData();
  form.append('store_name', store_name);
  form.append('email', email);
  form.append('senha', senha);
  form.append('plano', plano);

  try {
    const r = await fetch('/assinar/checkout', { method: 'POST', body: form });
    const d = await r.json();
    if (d.redirect) {
      window.location.href = d.redirect;
    } else {
      err.textContent = d.error || 'Erro ao processar. Tente novamente.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-lock-fill me-2"></i>Ir para o pagamento →';
    }
  } catch(e) {
    err.textContent = 'Erro de conexão. Tente novamente.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-lock-fill me-2"></i>Ir para o pagamento →';
  }
}
</script>
</body>
</html>
