{% extends 'base.html' %}
{% block title %}{{ 'Editar' if customer else 'Novo' }} Cliente – Vendix{% endblock %}

{% block content %}
<div class="page-header">
  <h1><i class="bi bi-person{{ '-gear' if customer else '-plus' }} me-2"></i>{{ 'Editar Cliente' if customer else 'Novo Cliente' }}</h1>
</div>

<div class="card" style="max-width:600px;">
  <div class="card-body p-4">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" value="{{ customer.name if customer else '' }}" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Telefone</label>
        <input type="text" name="phone" class="form-control" value="{{ customer.phone if customer else '' }}" placeholder="(00) 00000-0000">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">CEP</label>
        <div class="input-group">
          <input type="text" name="cep" id="cepInput" class="form-control"
                 value="{{ customer.cep if customer else '' }}" placeholder="00000-000"
                 maxlength="9" inputmode="numeric" autocomplete="off">
          <button type="button" class="btn btn-outline-secondary" id="btnBuscarCep">
            <i class="bi bi-search"></i>
          </button>
        </div>
        <div class="form-text" id="cepMsg"></div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Bairro</label>
        <select name="neighborhood_id" class="form-select" id="neighborhoodSel" onchange="applyFee(this)">
          <option value="">— Sem bairro —</option>
          {% for n in neighborhoods %}
          <option value="{{ n.id }}" data-fee="{{ n.delivery_fee }}"
            {% if customer and customer.neighborhood_id == n.id %}selected{% endif %}>
            {{ n.name }} (R$ {{ '%.2f'|format(n.delivery_fee) }})
          </option>
          {% endfor %}
        </select>
        <div class="form-text" id="bairroMsg"></div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Endereço</label>
        <input type="text" name="address" id="addressInput" class="form-control" value="{{ customer.address if customer else '' }}" placeholder="Rua, número…">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Observações</label>
        <textarea name="notes" class="form-control" rows="2">{{ customer.notes if customer else '' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning fw-semibold">
          <i class="bi bi-check-lg me-1"></i> Salvar
        </button>
        <a href="{{ url_for('customers.index') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>

<!-- Modal: cadastrar bairro rapidamente -->
<div class="modal fade" id="modalBairro" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-geo-alt me-2 text-warning"></i>Cadastrar Bairro</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-semibold">Nome do bairro</label>
          <input type="text" id="novoBairroNome" class="form-control">
        </div>
        <div class="mb-2">
          <label class="form-label fw-semibold">Taxa de entrega (R$)</label>
          <input type="text" id="novoBairroTaxa" class="form-control" inputmode="decimal" placeholder="0,00">
        </div>
        <div class="form-text" id="modalBairroMsg"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-warning fw-semibold" id="btnSalvarBairro">
          <i class="bi bi-check-lg me-1"></i>Salvar bairro
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function applyFee(sel) {
  const opt = sel.options[sel.selectedIndex];
  // only informativo — backend salva a taxa
}

const cepInput   = document.getElementById('cepInput');
const cepMsg     = document.getElementById('cepMsg');
const bairroMsg  = document.getElementById('bairroMsg');
const addressInp = document.getElementById('addressInput');
const bairroSel  = document.getElementById('neighborhoodSel');

// Máscara simples 00000-000
cepInput.addEventListener('input', function() {
  let v = this.value.replace(/\D/g, '').slice(0, 8);
  if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5);
  this.value = v;
  if (v.replace(/\D/g, '').length === 8) buscarCep();
});

document.getElementById('btnBuscarCep').addEventListener('click', buscarCep);

function buscarCep() {
  const cep = cepInput.value.replace(/\D/g, '');
  cepMsg.textContent = '';
  bairroMsg.textContent = '';
  if (cep.length !== 8) {
    cepMsg.innerHTML = '<span class="text-danger">CEP deve ter 8 dígitos.</span>';
    return;
  }
  cepMsg.innerHTML = '<span class="text-muted">Buscando…</span>';

  fetch(`https://viacep.com.br/ws/${cep}/json/`)
    .then(r => r.json())
    .then(d => {
      if (d.erro) {
        cepMsg.innerHTML = '<span class="text-danger">CEP não encontrado.</span>';
        return;
      }
      cepMsg.innerHTML = `<span class="text-success">${d.localidade} - ${d.uf}</span>`;

      // Preenche o endereço (rua), preservando número se já houver
      if (d.logradouro) {
        addressInp.value = d.logradouro;
        addressInp.focus();
      }

      // Tenta casar o bairro retornado com um bairro já cadastrado
      if (d.bairro) {
        const alvo = d.bairro.trim().toLowerCase();
        let achou = false;
        for (const opt of bairroSel.options) {
          // texto da option é "Nome (R$ x)", pega só o nome
          const nome = opt.text.split('(')[0].trim().toLowerCase();
          if (nome === alvo) { bairroSel.value = opt.value; achou = true; break; }
        }
        if (achou) {
          bairroMsg.innerHTML = `<span class="text-success">Bairro "${d.bairro}" selecionado.</span>`;
        } else {
          bairroMsg.innerHTML = `<span class="text-warning">Bairro "${d.bairro}" ainda não cadastrado. `
            + `<a href="#" id="linkCadBairro">Cadastrar bairro</a> para definir a taxa.</span>`;
          document.getElementById('linkCadBairro').addEventListener('click', function(e) {
            e.preventDefault();
            abrirModalBairro(d.bairro);
          });
        }
      }
    })
    .catch(() => {
      cepMsg.innerHTML = '<span class="text-danger">Erro ao consultar o CEP. Tente novamente.</span>';
    });
}

// ── Cadastro rápido de bairro (modal) ──
const modalBairro = new bootstrap.Modal(document.getElementById('modalBairro'));
const modalBairroMsg = document.getElementById('modalBairroMsg');

function abrirModalBairro(nome) {
  document.getElementById('novoBairroNome').value = nome || '';
  document.getElementById('novoBairroTaxa').value = '';
  modalBairroMsg.textContent = '';
  modalBairro.show();
}

document.getElementById('btnSalvarBairro').addEventListener('click', function() {
  const nome = document.getElementById('novoBairroNome').value.trim();
  const taxa = document.getElementById('novoBairroTaxa').value.replace(',', '.').trim() || '0';
  if (!nome) {
    modalBairroMsg.innerHTML = '<span class="text-danger">Informe o nome do bairro.</span>';
    return;
  }
  modalBairroMsg.innerHTML = '<span class="text-muted">Salvando…</span>';

  fetch("{{ url_for('customers.bairro_criar_ajax') }}", {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: nome, fee: taxa }),
  })
  .then(r => r.json())
  .then(d => {
    if (d.error) {
      modalBairroMsg.innerHTML = `<span class="text-danger">${d.error}</span>`;
      return;
    }
    // Adiciona (ou reaproveita) a opção no select e seleciona
    let opt = [...bairroSel.options].find(o => o.value == d.id);
    if (!opt) {
      opt = document.createElement('option');
      opt.value = d.id;
      opt.setAttribute('data-fee', d.fee);
      opt.text = `${d.name} (R$ ${parseFloat(d.fee).toFixed(2)})`;
      bairroSel.appendChild(opt);
    }
    bairroSel.value = d.id;
    bairroMsg.innerHTML = `<span class="text-success">Bairro "${d.name}" cadastrado e selecionado.</span>`;
    modalBairro.hide();
  })
  .catch(() => {
    modalBairroMsg.innerHTML = '<span class="text-danger">Erro ao salvar o bairro.</span>';
  });
});
</script>
{% endblock %}
