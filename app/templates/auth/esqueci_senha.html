<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci minha senha — Vendix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#1a1a2e,#2d2d4e); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
    .btn-primary { background: #c9a84c; border-color: #c9a84c; font-weight: 600; }
    .btn-primary:hover { background: #b8943d; border-color: #b8943d; }
  </style>
</head>
<body>
<div class="card">
  <img src="/static/img/logomarca.png" alt="Vendix" style="height:48px;display:block;margin:0 auto 20px;">

  <h5 class="fw-bold text-center mb-1">Recuperar senha</h5>
  <p class="text-muted text-center small mb-4">Informe seu e-mail e enviaremos um link para criar uma nova senha.</p>

  {% for cat, msg in get_flashed_messages(with_categories=true) %}
  <div class="alert alert-{{ 'danger' if cat == 'danger' else 'info' }} py-2 small">{{ msg }}</div>
  {% endfor %}

  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label fw-semibold">E-mail da conta</label>
      <input type="email" name="email" class="form-control" placeholder="seu@email.com" required autofocus>
    </div>
    <button type="submit" class="btn btn-primary w-100">
      <i class="bi bi-envelope me-2"></i>Enviar link de recuperação
    </button>
  </form>

  <div class="text-center mt-3">
    <a href="{{ url_for('auth.login') }}" class="text-muted small">
      <i class="bi bi-arrow-left me-1"></i>Voltar ao login
    </a>
  </div>
</div>
</body>
</html>
