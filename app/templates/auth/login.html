<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Vendix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,.3); position: relative; z-index: 1; }
    .brand { font-size: 2rem; font-weight: 800; color: #1a1a2e; letter-spacing: 1px; text-align: center; margin-bottom: 4px; }
    .brand span { color: #c9a84c; }
    .subtitle { text-align: center; color: #6b7280; font-size: .9rem; margin-bottom: 28px; }
    .btn-primary { background: #c9a84c; border-color: #c9a84c; font-weight: 600; }
    .btn-primary:hover { background: #b8943d; border-color: #b8943d; }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="login-card">
  <img src="/static/img/logomarca.png" alt="Vendix" style="height:52px;display:block;margin:0 auto 8px;">
  <div class="subtitle">Sistema de PDV para pequenos negócios</div>

  {% for cat, msg in get_flashed_messages(with_categories=true) %}
  <div class="alert alert-{{ 'danger' if cat == 'danger' else 'success' }}">{{ msg }}</div>
  {% endfor %}

  <form method="post" id="loginForm">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
    <div class="mb-3">
      <label class="form-label fw-semibold">E-mail ou usuário</label>
      <input type="text" name="email" id="inputEmail" class="form-control" placeholder="seu@email.com ou nome_usuario" required autocomplete="username" autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Senha</label>
      <input type="password" name="password" id="inputPassword" class="form-control" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <div class="mb-4 d-flex align-items-center">
      <input type="checkbox" name="remember" id="remember" style="width:16px;height:16px;accent-color:#c9a84c;cursor:pointer;">
      <label for="remember" style="margin-left:8px;font-size:.88rem;color:#6b7280;cursor:pointer;margin-bottom:0;">
        Salvar login neste dispositivo
      </label>
    </div>
    <button type="submit" class="btn btn-primary w-100 btn-lg">
      <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
    </button>
  </form>
  <script>
    // Limpa credenciais antigas salvas em texto puro por versões anteriores.
    // O "Salvar login" agora usa o cookie seguro de sessão do servidor (remember-me).
    try { localStorage.removeItem('vendix_creds'); } catch (e) {}
  </script>

  <div class="text-center mt-3">
    <a href="{{ url_for('auth.esqueci_senha') }}" style="font-size:.85rem;color:#c9a84c;text-decoration:none;">
      <i class="bi bi-key me-1"></i>Esqueci minha senha
    </a>
  </div>
  <div class="text-center mt-2" style="font-size:.8rem;color:#9ca3af;">
    Problemas com acesso? Entre em contato com o suporte.
  </div>
</div>
<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  const GOLD = 'rgba(201,168,76,', SILVER = 'rgba(180,180,220,';
  class Particle {
    constructor() { this.reset(true); }
    reset(initial) {
      this.x = Math.random() * canvas.width;
      this.y = initial ? Math.random() * canvas.height : canvas.height + 10;
      this.r = Math.random() * 1.8 + 0.4;
      this.vy = -(Math.random() * 0.4 + 0.15);
      this.vx = (Math.random() - 0.5) * 0.25;
      this.alpha = Math.random() * 0.5 + 0.15;
      this.color = Math.random() > 0.4 ? GOLD : SILVER;
      this.pulse = Math.random() * Math.PI * 2;
    }
    update() { this.y += this.vy; this.x += this.vx; this.pulse += 0.02; if (this.y < -10) this.reset(false); }
    draw() {
      const a = this.alpha * (0.8 + 0.2 * Math.sin(this.pulse));
      ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = this.color + a + ')'; ctx.fill();
    }
  }
  class Streak {
    constructor() { this.reset(true); }
    reset(initial) {
      this.x = Math.random() * canvas.width;
      this.y = initial ? Math.random() * canvas.height : canvas.height + 20;
      this.len = Math.random() * 60 + 20;
      this.vy = -(Math.random() * 0.6 + 0.2);
      this.alpha = Math.random() * 0.08 + 0.02;
      this.color = Math.random() > 0.5 ? GOLD : SILVER;
    }
    update() { this.y += this.vy; if (this.y + this.len < 0) this.reset(false); }
    draw() {
      const grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.len);
      grad.addColorStop(0, this.color + '0)');
      grad.addColorStop(0.5, this.color + this.alpha + ')');
      grad.addColorStop(1, this.color + '0)');
      ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x, this.y + this.len);
      ctx.strokeStyle = grad; ctx.lineWidth = 0.8; ctx.stroke();
    }
  }
  const particles = Array.from({length: 120}, () => new Particle());
  const streaks   = Array.from({length: 18},  () => new Streak());
  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    streaks.forEach(s => { s.update(); s.draw(); });
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
