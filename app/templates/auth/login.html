<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Vendix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#1a1a2e,#2d2d4e); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
    .brand { font-size: 2rem; font-weight: 800; color: #1a1a2e; letter-spacing: 1px; text-align: center; margin-bottom: 4px; }
    .brand span { color: #c9a84c; }
    .subtitle { text-align: center; color: #6b7280; font-size: .9rem; margin-bottom: 28px; }
    .btn-primary { background: #c9a84c; border-color: #c9a84c; font-weight: 600; }
    .btn-primary:hover { background: #b8943d; border-color: #b8943d; }
  </style>
</head>
<body>
<div class="login-card">
  <img src="/static/img/logomarca.png" alt="Vendix" style="height:52px;display:block;margin:0 auto 8px;">
  <div class="subtitle">Sistema de PDV para pequenos negócios</div>

  {% for cat, msg in get_flashed_messages(with_categories=true) %}
  <div class="alert alert-{{ 'danger' if cat == 'danger' else 'success' }}">{{ msg }}</div>
  {% endfor %}

  <form method="post" id="loginForm">
    <div class="mb-3">
      <label class="form-label fw-semibold">E-mail ou usuário</label>
      <input type="text" name="email" id="inputEmail" class="form-control" placeholder="seu@email.com ou nome_usuario" required autocomplete="username">
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Senha</label>
      <input type="password" name="password" id="inputPassword" class="form-control" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <div class="mb-4 d-flex align-items-center">
      <input type="checkbox" name="remember" id="remember" style="width:16px;height:16px;accent-color:#c9a84c;cursor:pointer;">
      <label for="remember" style="margin-left:8px;font-size:.88rem;color:#6b7280;cursor:pointer;margin-bottom:0;">
        Salvar login neste dispositivo
      </label>
    </div>
    <button type="submit" class="btn btn-primary w-100 btn-lg">
      <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
    </button>
  </form>
  <script>
    const emailEl = document.getElementById('inputEmail');
    const passEl  = document.getElementById('inputPassword');
    const remEl   = document.getElementById('remember');

    // Carregar credenciais salvas
    const saved = JSON.parse(localStorage.getItem('vendix_creds') || 'null');
    if (saved) {
      emailEl.value = saved.email;
      passEl.value  = saved.pass;
      remEl.checked = true;
      emailEl.removeAttribute('autofocus');
    } else {
      emailEl.setAttribute('autofocus', '');
    }

    // Salvar ou limpar ao submeter
    document.getElementById('loginForm').addEventListener('submit', () => {
      if (remEl.checked) {
        localStorage.setItem('vendix_creds', JSON.stringify({ email: emailEl.value, pass: passEl.value }));
      } else {
        localStorage.removeItem('vendix_creds');
      }
    });

    // Desmarcar checkbox limpa credenciais salvas imediatamente
    remEl.addEventListener('change', () => {
      if (!remEl.checked) localStorage.removeItem('vendix_creds');
    });
  </script>

  <div class="text-center mt-4" style="font-size:.8rem;color:#9ca3af;">
    Problemas com acesso? Entre em contato com o suporte.
  </div>
</div>
</body>
</html>
