<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Vendix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#1a1a2e,#2d2d4e); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
    .brand { font-size: 2rem; font-weight: 800; color: #1a1a2e; letter-spacing: 1px; text-align: center; margin-bottom: 4px; }
    .brand span { color: #c9a84c; }
    .subtitle { text-align: center; color: #6b7280; font-size: .9rem; margin-bottom: 28px; }
    .btn-primary { background: #c9a84c; border-color: #c9a84c; font-weight: 600; }
    .btn-primary:hover { background: #b8943d; border-color: #b8943d; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand">Ven<span>dix</span></div>
  <div class="subtitle">Sistema de PDV para pequenos negócios</div>

  {% for cat, msg in get_flashed_messages(with_categories=true) %}
  <div class="alert alert-{{ 'danger' if cat == 'danger' else 'success' }}">{{ msg }}</div>
  {% endfor %}

  <form method="post">
    <div class="mb-3">
      <label class="form-label fw-semibold">E-mail</label>
      <input type="email" name="email" class="form-control" placeholder="seu@email.com" required autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Senha</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary w-100 btn-lg">
      <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
    </button>
  </form>

  <div class="text-center mt-4" style="font-size:.8rem;color:#9ca3af;">
    Problemas com acesso? Entre em contato com o suporte.
  </div>
</div>
</body>
</html>
