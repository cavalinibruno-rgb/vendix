<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir senha — Vendix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#1a1a2e,#2d2d4e); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
    .btn-primary { background: #c9a84c; border-color: #c9a84c; font-weight: 600; }
    .btn-primary:hover { background: #b8943d; border-color: #b8943d; }
    .strength-bar { height: 4px; border-radius: 2px; transition: width .3s, background .3s; }
  </style>
</head>
<body>
<div class="card">
  <img src="/static/img/logomarca.png" alt="Vendix" style="height:48px;display:block;margin:0 auto 20px;">

  <h5 class="fw-bold text-center mb-1">Nova senha</h5>
  <p class="text-muted text-center small mb-4">Crie uma senha com pelo menos 8 caracteres.</p>

  {% for cat, msg in get_flashed_messages(with_categories=true) %}
  <div class="alert alert-{{ 'danger' if cat == 'danger' else 'success' }} py-2 small">{{ msg }}</div>
  {% endfor %}

  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label fw-semibold">Nova senha</label>
      <input type="password" name="senha" id="novaSenha" class="form-control" placeholder="••••••••" minlength="8" required autofocus autocomplete="new-password">
      <div class="mt-1 bg-secondary bg-opacity-25 rounded">
        <div id="strengthBar" class="strength-bar" style="width:0;background:#dc3545;"></div>
      </div>
      <div id="strengthLabel" class="text-muted small mt-1"></div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Confirmar senha</label>
      <input type="password" name="confirmacao" id="confirmSenha" class="form-control" placeholder="••••••••" required autocomplete="new-password">
      <div id="matchMsg" class="small mt-1"></div>
    </div>
    <button type="submit" class="btn btn-primary w-100" id="btnSalvar">
      <i class="bi bi-shield-check me-2"></i>Salvar nova senha
    </button>
  </form>
</div>

<script>
  const nova    = document.getElementById('novaSenha');
  const conf    = document.getElementById('confirmSenha');
  const bar     = document.getElementById('strengthBar');
  const label   = document.getElementById('strengthLabel');
  const matchEl = document.getElementById('matchMsg');
  const btn     = document.getElementById('btnSalvar');

  nova.addEventListener('input', () => {
    const v = nova.value;
    let score = 0;
    if (v.length >= 8)  score++;
    if (v.length >= 12) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;

    const pct   = Math.min(100, score * 20) + '%';
    const cores = ['#dc3545','#fd7e14','#ffc107','#20c997','#198754'];
    const texts = ['','Muito fraca','Fraca','Média','Boa','Forte'];
    bar.style.width      = pct;
    bar.style.background = cores[score - 1] || '#dc3545';
    label.textContent    = v.length ? (texts[score] || '') : '';
    checkMatch();
  });

  conf.addEventListener('input', checkMatch);

  function checkMatch() {
    if (!conf.value) { matchEl.textContent = ''; return; }
    if (nova.value === conf.value) {
      matchEl.textContent = '✓ Senhas coincidem';
      matchEl.style.color = '#198754';
    } else {
      matchEl.textContent = '✗ Senhas não coincidem';
      matchEl.style.color = '#dc3545';
    }
  }
</script>
</body>
</html>
