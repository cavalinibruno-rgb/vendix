<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificação — Vendix Master</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg,#1a1a2e,#2d2d4e); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,.3); background:#fff; }
    .btn-primary { background: #c9a84c; border-color: #c9a84c; font-weight: 600; }
    .btn-primary:hover { background: #b8943d; border-color: #b8943d; }
    .code-input { font-size: 2rem; font-weight: 700; letter-spacing: 12px; text-align: center; }
  </style>
</head>
<body>
<div class="card">
  <div class="text-center mb-4">
    <img src="/static/img/logomarca.png" alt="Vendix" style="height:48px;margin-bottom:16px;display:block;margin:0 auto 12px;">
    <div style="font-size:2.2rem;"><i class="bi bi-shield-lock" style="color:#c9a84c;"></i></div>
    <h5 class="fw-bold mt-2 mb-1">Verificação em dois fatores</h5>
    <p class="text-muted small mb-0">Enviamos um código de 6 dígitos para o seu e-mail. Válido por 10 minutos.</p>
  </div>

  {% for cat, msg in get_flashed_messages(with_categories=true) %}
  <div class="alert alert-{{ 'danger' if cat == 'danger' else 'info' }}">{{ msg }}</div>
  {% endfor %}

  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-4">
      <input type="text" name="code" class="form-control code-input" placeholder="000000"
             maxlength="6" inputmode="numeric" pattern="[0-9]{6}" autofocus autocomplete="one-time-code" required>
    </div>
    <button type="submit" class="btn btn-primary w-100 btn-lg">
      <i class="bi bi-check-circle me-2"></i>Verificar
    </button>
  </form>

  <form method="post" action="{{ url_for('auth.reenviar_2fa') }}" class="mt-3 text-center">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" class="btn btn-link btn-sm" style="color:#c9a84c;text-decoration:none;">
      <i class="bi bi-arrow-repeat me-1"></i>Reenviar código
    </button>
  </form>

  <div class="text-center mt-2">
    <a href="{{ url_for('auth.login') }}" style="font-size:.85rem;color:#9ca3af;text-decoration:none;">
      <i class="bi bi-arrow-left me-1"></i>Voltar ao login
    </a>
  </div>
</div>
<script>
  // Auto-submete quando 6 dígitos são digitados
  document.querySelector('input[name="code"]').addEventListener('input', function() {
    if (this.value.length === 6) this.closest('form').submit();
  });
</script>
</body>
</html>
