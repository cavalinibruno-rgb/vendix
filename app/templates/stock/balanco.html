<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Relatório de Balanço — {{ tenant.store_name }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; color: #111; background: #fff; padding: 24px; }
    h1 { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
    .sub { color: #666; font-size: 11px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; border: 1px solid #cfcfcf; }
    thead th { background: #1a1a2e; color: #fff; padding: 8px 10px; text-align: left; font-size: 12px; border: 1px solid #1a1a2e; }
    tbody td { padding: 9px 10px; border: 1px solid #cfcfcf; font-size: 12px; }
    tbody td.contado { min-width: 130px; }
    @media print {
      body { padding: 12px; }
      .no-print { display: none; }
      @page { margin: 1cm; }
      tbody tr { page-break-inside: avoid; }
    }
    .btn-print { background: #c9a84c; color: #1a1a2e; border: none; padding: 8px 20px;
                 border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 13px; margin-bottom: 16px; }
    .btn-pdf { background: #1a1a2e; color: #fff; border: none; padding: 8px 20px;
               border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 13px; margin-bottom: 16px; margin-left: 8px; }
    .btn-back { background: #e5e5e5; color: #1a1a2e; border: none; padding: 8px 20px;
                border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 13px; margin-bottom: 16px; margin-left: 8px; }
  </style>
</head>
<body>

<button class="btn-print no-print" onclick="window.print()">
  🖨️ Imprimir
</button>
<button class="btn-pdf no-print" onclick="baixarPDF()">
  📄 Baixar PDF
</button>
<button class="btn-back no-print" onclick="history.back()">
  ← Voltar
</button>

<h1 id="titulo">{{ tenant.store_name }}</h1>
<div class="sub" id="sub">Relatório de Balanço — gerado em {{ agora.strftime('%d/%m/%Y às %H:%M') }}</div>

<table id="tabela">
  <thead>
    <tr>
      <th>#</th>
      <th>Produto</th>
      <th>Categoria</th>
      <th>Estoque Esperado</th>
      <th>Contado</th>
    </tr>
  </thead>
  <tbody>
    {% for p in produtos %}
    <tr>
      <td style="color:#888;">{{ loop.index }}</td>
      <td><strong>{{ p.name }}</strong></td>
      <td style="color:#666;">{{ p.type.name if p.type else '—' }}</td>
      <td>{{ eff_stock(p) }}</td>
      <td class="contado">&nbsp;</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script>
function _nomeArquivo(tipo) {
  const nome = document.getElementById('titulo').textContent.trim().replace(/[^\w]+/g, '-');
  const d = new Date();
  const data = String(d.getDate()).padStart(2,'0') + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + d.getFullYear();
  return tipo + '-' + nome + '-' + data + '.pdf';
}
function baixarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
  doc.setFont('helvetica', 'bold'); doc.setFontSize(15);
  doc.text(document.getElementById('titulo').textContent, 40, 42);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(120);
  doc.text(document.getElementById('sub').textContent, 40, 58);
  doc.autoTable({
    html: '#tabela',
    startY: 72,
    theme: 'grid',
    styles: { fontSize: 9, cellPadding: 5, lineColor: [210,210,210], textColor: [20,20,20] },
    headStyles: { fillColor: [26,26,46], textColor: 255, fontStyle: 'bold' },
    columnStyles: { 4: { cellWidth: 110, minCellHeight: 24 } },
  });
  doc.save(_nomeArquivo('balanco'));
}
</script>

</body>
</html>
