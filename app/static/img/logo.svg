<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 72" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@800&amp;display=swap');
    </style>
  </defs>

  <!-- VENDI -->
  <text x="0" y="60"
    font-family="Barlow, 'Arial Black', sans-serif"
    font-weight="800"
    font-size="66"
    letter-spacing="2"
    fill="white">VENDI</text>

  <!-- X: traço \ (branco completo) -->
  <line x1="296" y1="2" x2="378" y2="70" stroke="white" stroke-width="18" stroke-linecap="butt"/>
  <!-- X: traço / superior (laranja) -->
  <line x1="378" y1="2" x2="337" y2="36" stroke="#F97316" stroke-width="18" stroke-linecap="butt"/>
  <!-- X: traço / inferior (branco) -->
  <line x1="337" y1="36" x2="296" y2="70" stroke="white" stroke-width="18" stroke-linecap="butt"/>
</svg>
